<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Gift for Madam Jii 💗🌸</title>
<style>
  body {
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    font-family: 'Comic Sans MS', cursive, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  h1 {
    color: #ff2d95;
    text-align: center;
    margin-bottom: 20px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  .love-line {
    color: #ff3399;
    font-size: 18px;
    margin: 3px 0;
    animation: fadeIn 0.5s ease-in-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-20px);}
    to { opacity: 1; transform: translateX(0);}
  }
  .extra-lines {
    color: #fff;
    font-size: 20px;
    margin-top: 30px;
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>

<h1>I love youu💗 Madam jii 🌸 1000 times!</h1>

<div id="love-container"></div>

<div class="extra-lines">
  🌸 You are the sparkle in my day.<br>
  💖 My heart beats only for you.<br>
  🌹 Forever yours, Madam Jii.<br>
  ✨ You make life magical every moment.
</div>

<script>
  const container = document.getElementById('love-container');
  for(let i=1; i<=1000; i++){
    const line = document.createElement('div');
    line.className = 'love-line';
    line.textContent = `I love youu💗 Madam jii 🌸 ${i}`;
    container.appendChild(line);
  }
</script>

</body>
</html>
